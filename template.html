
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Monarca Full System (70% Menu Image)</title>

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">

  <style>

    /* =========================================
       GLOBAL
    ========================================= */

    body {

      margin: 0;

      background: #404040;

      font-family: 'Quicksand', sans-serif;

      color: white;
    }

    * {
      box-sizing: border-box;
    }

    a {
      text-decoration: none;
    }

    /* =========================================
       HEADER
    ========================================= */

    .monarca-header {

      display: flex;

      justify-content: space-between;

      align-items: center;

      padding: 10px 40px;

      background: #404040;

      border-bottom: 5px solid #A07447;

      gap: 20px;
    }

    /* CAPSULE SYSTEM */

    .capsule {

      display: flex;

      flex-direction: column;

      align-items: center;

      justify-content: center;

      text-align: center;

      gap: 2px;

      min-width: 160px;
    }

    .header-logo {

      width: 60px;

      height: auto;

      margin-bottom: 2px;
    }

    .logo-main,
    .logo-sub {

      margin: 0;

      font-family: 'Lobster', cursive;

      color: #F97803;

      line-height: 1;
    }

    .logo-main { font-size: 20px; }
    .logo-sub { font-size: 18px; }

.header-left {

  display: flex;

  flex-direction: column;

  align-items: center;

  justify-content: center;

  text-align: center;

  gap: 1px;
}

    /* =========================================
       MENU PORTAL
    ========================================= */

    .menu-portal {

      position: relative;

      display: flex;

      justify-content: center;

      align-items: center;
    }

    /* 🔥 70
    % SIZE CONTROL */
    .menu-image {

      width: 112px; /* 70% of 160px */

      height: auto;

      cursor: pointer;

      display: block;
    }

    .menu-dropdown {

      position: absolute;

      top: 100%;

      left: 50%;

      transform: translateX(-50%);

      display: flex;

      flex-direction: column;

      background: #404040;

      border: 2px solid #A07447;

      padding: 10px;

      gap: 6px;

      opacity: 0;

      visibility: hidden;

      transition: 0.2s ease;

      min-width: 200px;

      z-index: 999;
    }

    .menu-portal:hover .menu-dropdown {

      opacity: 1;

      visibility: visible;
    }

    .menu-dropdown a {

      font-family: "CCComicrazy", cursive;

      color: #FFFFFF;

      font-size: 14px;

      padding: 4px 6px;

      border-radius: 4px;
    }

    .menu-dropdown a:hover {

      background: #F97803;
    }

    /* =========================================
       RIGHT CAPSULE
    ========================================= */

    .title-main,
    .title-sub {

      margin: 0;

      font-family: "CCComicrazy", cursive;

      color: #FFFFFF;

      line-height: 1;
    }

    .title-main { font-size: 34px; }
    .title-sub { font-size: 16px; }

    /* =========================================
       FOOTER
    ========================================= */

    .monarca-footer {

      display: flex;

      justify-content: space-between;

      align-items: center;

      padding: 18px 40px;

      background: #404040;

      border-top: 5px solid #A07447;

      gap: 20px;
    }

    .footer-left,
    .footer-right {

      min-width: 160px;

      display: flex;

      align-items: center;

      justify-content: center;
    }

    .footer-middle {

      flex: 1;

      text-align: center;

      font-family: "Quicksand", sans-serif;

      font-size: 14px;

      color: #808080;

      display: flex;

      justify-content: center;

      align-items: center;
    }

    .back-to-top {

      display: inline-block;

      padding: 10px 16px;

      border: 3px solid #FFFFFF;

      border-radius: 7px;

      background: #F97803;

      color: #FFFFFF;

      font-family: "CCComicrazy", cursive;

      font-size: 18px;

      font-weight: 700;

      line-height: 1;

      transition: transform 0.15s ease;
    }

    .back-to-top:hover {

      transform: scale(1.05);
    }

    /* =========================================
       RESPONSIVE
    ========================================= */

    @media (max-width: 900px) {

      .monarca-header,
      .monarca-footer {

        flex-direction: column;

        text-align: center;
      }

      .capsule {

        min-width: auto;
      }

      .footer-left,
      .footer-right {

        min-width: auto;
      }
    }

  </style>

</head>

<body>

  <!-- HEADER -->
  <header class="monarca-header">

    <!-- LEFT -->
    <div class="capsule">

      <img
        class="header-logo"
        src="https://coollazycat.github.io/oranginosatsuma/Orangino.png"
        alt="Logo"
      >

      <div class="logo-main">Orangino</div>

      <div class="logo-sub">Satsuma</div>

    </div>

    <!-- MIDDLE MENU -->
    <div class="menu-portal">

      <img
        src="https://coollazycat.github.io/oranginosatsuma/Home.png"
        class="menu-image"
        alt="Home Menu"
      >

      <div class="menu-dropdown">

        <a href="index.html">== HOME ==</a>
        <a href="welcome.html">WELCOME</a>
        <a href="wordsmith.html">WORDSMITH</a>
        <a href="languages.html">LANGUAGES</a>
        <a href="news.html">NEWS</a>
        <a href="markets.html">MARKETS</a>
        <a href="oil.html">OIL</a>
        <a href="radio.html">RADIO</a>
        <a href="classical.html">CLASSICAL</a>
        <a href="biographies.html">BIOGRAPHIES</a>
        <a href="puzzles.html">PUZZLES</a>
        <a href="food.html">FOOD</a>

      </div>

    </div>

    <!-- RIGHT -->
    <div class="capsule">

      <div class="title-main">The Curator Cat</div>

      <div class="title-sub">Treasury of Links for Work and Play</div>

    </div>

  </header>

  <!-- MAIN -->
  <main style="padding:40px;">
    <div style="border:5px solid #A07447; padding:30px;">
      Content goes here
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="monarca-footer">

    <div class="footer-left"></div>

    <div class="footer-middle">
      © 2025 Orangino Satsuma. All rights reserved.
    </div>

    <div class="footer-right">
      <a href="#" class="back-to-top">BACK TO TOP</a>
    </div>

  </footer>

</body>

</html>
